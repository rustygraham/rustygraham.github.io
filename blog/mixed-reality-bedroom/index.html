e with models from Oculus Home. Also took apart the wood pile and made a campfire.<figure class="post__image"><a href="https://imgur.com/a/itoh6" target="_blank" rel="noopener noreferrer"><img loading="lazy" class="post__image" src="https://www.grahamrust.me/media/posts/19/image-asset-2.webp" alt="" width="960" height="479" sizes="(max-width: 1920px) 100vw, 1920px" srcset="https://www.grahamrust.me/media/posts/19/responsive/image-asset-2-xs.webp 640w, https://www.grahamrust.me/media/posts/19/responsive/image-asset-2-sm.webp 768w, https://www.grahamrust.me/media/posts/19/responsive/image-asset-2-md.webp 1024w, https://www.grahamrust.me/media/posts/19/responsive/image-asset-2-lg.webp 1366w, https://www.grahamrust.me/media/posts/19/responsive/image-asset-2-xl.webp 1600w, https://www.grahamrust.me/media/posts/19/responsive/image-asset-2-2xl.webp 1920w"></a></figure>I have a clock on the wall that shows the actual time. This gif is sped up to show the movement of the minute hand. This is made using <a target="_blank" href="https://www.unrealengine.com/marketplace/real-time-clock" rel="noopener" tabindex="0">Real Time Clock</a> on the UE4 Marketplace.<p></p><p>Thanks for checking out my room!</p><a target="_blank" href="http://tf3dm.com/3d-model/portal-gun-from-portal-2-74735.html" rel="noopener" tabindex="0"></a><p> </p></figure></div><footer class="content__footer"><div class="entry-wrapper"><div class="content__actions"><div class="content__share"><button class="btn--icon content__share-button js-content__share-button"><svg width="20" height="20" aria-hidden="true"><use xlink:href="https://www.grahamrust.me/assets/svg/svg-map.svg#share"></use></svg> <span>Share It</span></button><div class="content__share-popup js-content__share-popup"><a href="https://www.facebook.com/sharer/sharer.php?u=https%3A%2F%2Fwww.grahamrust.me%2Fblog%2Fmixed-reality-bedroom%2Findex.html" class="js-share facebook" rel="nofollow noopener noreferrer"><svg class="icon" aria-hidden="true" focusabl
